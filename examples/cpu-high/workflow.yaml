name: cpu-diagnosis
description: CPU high diagnosis workflow

steps:
  - name: observe_cpu
    action: ssh_exec
    command: "top -bn1 | head -20"
    timeout: 10

  - name: check_process
    action: ssh_exec
    command: "ps aux --sort=-%cpu | head -10"
    depends_on: observe_cpu

  - name: check_load
    action: ssh_exec
    command: "uptime"
    depends_on: observe_cpu

  - name: check_gc
    action: ssh_exec
    command: "jstat -gc $(pgrep java | head -1) 2>/dev/null || echo 'No Java process'"
    depends_on: check_process
    optional: true

  - name: analyze
    action: ai_analyze
    input: |
      CPU Info: {{observe_cpu.output}}
      Top Processes: {{check_process.output}}
      Load Average: {{check_load.output}}
      GC Stats: {{check_gc.output}}
    prompt: "Analyze CPU usage and identify root cause"
    depends_on: [observe_cpu, check_process, check_load, check_gc]

  - name: generate_fix
    action: ai_analyze
    input: "{{analyze.result}}"
    prompt: "Generate fix command based on root cause"
    depends_on: analyze

  - name: approval
    action: request_approval
    prompt: "Execute fix: {{generate_fix.result}}"
    risk_level: medium
    depends_on: generate_fix

  - name: execute_fix
    action: ssh_exec
    command: "{{generate_fix.result}}"
    condition: "approval.approved == true"
    depends_on: approval

  - name: verify
    action: ssh_exec
    command: "top -bn1 | grep 'Cpu(s)'"
    depends_on: execute_fix

  - name: record
    action: memory_store
    content: |
      Incident: CPU High
      Root Cause: {{analyze.root_cause}}
      Fix: {{generate_fix.result}}
      Success: {{verify.output}}
    depends_on: verify
