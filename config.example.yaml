# Agentic AIOps 配置文件
# 复制为 config.yaml 后修改
# 敏感信息建议使用环境变量

# 服务器配置
servers:
  - name: production
    host: your-server-ip
    port: 22
    user: root
    # 密码建议使用环境变量: AIOPS_SERVER_PRODUCTION_PASSWORD
    # password: xxx
    # key_file: ~/.ssh/id_rsa

  - name: staging
    host: staging-server-ip
    port: 22
    user: deploy
    # key_file: ~/.ssh/deploy_key

# 默认设置
defaults:
  timeout: 10
  retry: 3
  retry_delay: 5

# AI 配置
ai:
  enabled: false
  provider: deepseek  # deepseek, openai, anthropic, openrouter
  # api_key 建议使用环境变量: AIOPS_AI_API_KEY 或 DEEPSEEK_API_KEY
  # api_key: ""
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  max_tokens: 4096
  temperature: 0.2
  timeout: 30

# 告警阈值
thresholds:
  cpu:
    warning: 70
    critical: 90
  memory:
    warning: 75
    critical: 90
  disk:
    warning: 75
    critical: 90
  load:
    warning: 2.0
    critical: 5.0

# 安全配置
security:
  # 命令白名单（如果配置，只有这些命令可以执行）
  # allowed_commands:
  #   - kubectl
  #   - docker
  #   - systemctl

  # 命令黑名单
  blocked_commands:
    - rm -rf
    - mkfs
    - dd
    - shutdown
    - reboot
    - init 0
    - init 6

  # 敏感路径
  blocked_paths:
    - /etc/shadow
    - /etc/passwd
    - /root/.ssh
    - /etc/sudoers

  # 输出限制
  max_output_size: 10000

  # 命令超时
  command_timeout: 60

  # 审计日志
  audit_logging: true

# 日志文件路径
log_files:
  - /var/log/syslog
  - /var/log/auth.log
  - /var/log/nginx/error.log
  - /var/log/messages

# 错误模式
error_patterns:
  - ERROR
  - FATAL
  - OOM
  - Connection refused
  - timeout
  - permission denied
  - segmentation fault

# 敏感端口
sensitive_ports:
  - 22
  - 3306
  - 5432
  - 6379
  - 27017
  - 8080
  - 443
